<!doctype html><html><head><meta charset="utf-8">
<style>:root{
  /* Swaply brand gradient (cool violet→cyan; intentionally not Instagram's palette) */
  --ig1:#c4b5fd; --ig2:#a78bfa; --ig3:#7c3aed; --ig4:#4f46e5; --ig5:#06b6d4;
  --bg:#0b0b0f; --card:#15151c; --ink:#ffffff; --muted:#9aa0aa; --line:#26262f;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:radial-gradient(120% 80% at 50% -10%, #241033 0%, var(--bg) 55%);
  color:var(--ink); -webkit-font-smoothing:antialiased;
  display:flex; align-items:center; justify-content:center;
  padding:24px 18px calc(24px + env(safe-area-inset-bottom));
  min-height:100%;
}
.card{
  width:100%; max-width:420px; background:var(--card);
  border:1px solid var(--line); border-radius:24px;
  padding:26px 22px; box-shadow:0 30px 80px -30px rgba(0,0,0,.8);
}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:22px;justify-content:center}
.logo{width:30px;height:30px;border-radius:9px;
  background:linear-gradient(45deg,var(--ig1),var(--ig2),var(--ig3),var(--ig4),var(--ig5));}
.brand b{font-size:18px;letter-spacing:-.2px}
h1{font-size:24px;line-height:1.2;margin:0 0 8px;letter-spacing:-.5px;text-align:center}
p.sub{color:var(--muted);font-size:15px;line-height:1.45;margin:0 0 22px;text-align:center}
.field{position:relative;margin-bottom:14px}
.field .at{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:17px}
input[type=text]{
  width:100%;padding:15px 16px 15px 32px;font-size:17px;color:var(--ink);
  background:#0f0f15;border:1px solid var(--line);border-radius:14px;outline:none;
}
input[type=text]:focus{border-color:var(--ig4);box-shadow:0 0 0 3px rgba(150,47,191,.25)}
.btn{
  -webkit-appearance:none;appearance:none;cursor:pointer;width:100%;border:0;
  padding:16px;border-radius:14px;font-size:17px;font-weight:600;color:#fff;
  background:linear-gradient(45deg,var(--ig3),var(--ig4),var(--ig5));
}
.btn:active{transform:translateY(1px)}
.btn.secondary{background:#20202a;color:var(--ink);font-weight:500;margin-top:10px}
.btn[disabled]{opacity:.5;pointer-events:none}
.err{color:#ff8080;font-size:13px;min-height:16px;margin:2px 4px 10px;text-align:center}
.qrwrap{background:#fff;border-radius:18px;padding:16px;display:flex;justify-content:center;margin:6px 0 16px}
.qrwrap img{display:block;width:100%;max-width:230px;height:auto;image-rendering:pixelated}
.linkrow{display:flex;gap:8px;margin-bottom:10px}
.linkrow input{flex:1;padding-left:16px;font-size:14px;color:var(--muted)}
.copybtn{padding:0 16px;border-radius:12px;border:1px solid var(--line);background:#20202a;color:#fff;font-size:14px;cursor:pointer}
.hint{color:var(--muted);font-size:13px;text-align:center;line-height:1.5}
.who{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:18px}
.who .av{width:44px;height:44px;border-radius:50%;
  background:linear-gradient(45deg,var(--ig1),var(--ig3),var(--ig5));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
.who .h{font-size:18px;font-weight:600}
.who .whosub{color:var(--muted);font-size:13px}
.big-emoji{font-size:44px;text-align:center;margin:0 0 8px}
.hidden{display:none !important}
.foot{margin-top:18px;text-align:center;color:#5b5b66;font-size:12px}

/* ---- dashboard ---- */
.dhead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
.dhead h1{text-align:left;margin:0}
.count{color:var(--muted);font-size:14px}
.dsub{color:var(--muted);font-size:14px;text-align:left;margin:0 0 18px}
.list{display:flex;flex-direction:column;gap:10px}
.row{display:flex;align-items:center;gap:12px;background:#0f0f15;border:1px solid var(--line);border-radius:14px;padding:12px 14px}
.row .av{width:38px;height:38px;flex:0 0 38px;border-radius:50%;
  background:linear-gradient(45deg,var(--ig1),var(--ig3),var(--ig5));display:flex;align-items:center;justify-content:center;font-weight:700}
.row .meta{flex:1;min-width:0}
.row .name{font-weight:600;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .time{color:var(--muted);font-size:12px}
.row .open{padding:8px 14px;border-radius:10px;border:0;font-size:14px;font-weight:600;color:#fff;cursor:pointer;
  background:linear-gradient(45deg,var(--ig3),var(--ig4));text-decoration:none;white-space:nowrap}
.row.done{opacity:.55}
.chk{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;cursor:pointer;user-select:none;white-space:nowrap}
.chk input{width:16px;height:16px;accent-color:var(--ig4)}
.empty{color:var(--muted);text-align:center;padding:30px 10px;line-height:1.5}
.toolbar{display:flex;gap:8px;margin-bottom:16px}
.toolbar a,.toolbar button{flex:1;text-align:center;padding:10px;border-radius:12px;border:1px solid var(--line);
  background:#20202a;color:#fff;font-size:14px;cursor:pointer;text-decoration:none}

/* ---- camera scanner overlay ---- */
.scan-overlay{position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center}
.scan-overlay video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.scan-mask{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:18px}
.scan-frame{width:66vw;max-width:300px;aspect-ratio:1;border-radius:28px;
  border:3px solid rgba(255,255,255,.95);box-shadow:0 0 0 100vmax rgba(0,0,0,.5)}
.scan-hint{color:#fff;font-size:15px;font-weight:600;text-shadow:0 1px 6px rgba(0,0,0,.7)}
.scan-cancel{position:absolute;left:50%;transform:translateX(-50%);
  bottom:calc(34px + env(safe-area-inset-bottom));z-index:2;width:auto;min-width:160px}

html,body{width:428px;height:926px;overflow:hidden}
.scan-frame svg{display:block;width:100%;height:auto}</style></head><body><div class="scan-overlay" style="position:static;height:956px">
