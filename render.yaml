# Render Blueprint — Swaply backend, production tier.
# Starter plan ($7/mo): always-on (no cold starts) + a persistent 1 GB disk so
# swap data survives restarts and redeploys. INSTASWAP_DATA_DIR points the JSON
# store at the mounted disk.
services:
  - type: web
    name: instaswap
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: INSTASWAP_DATA_DIR
        value: /var/data
    disk:
      name: instaswap-data
      mountPath: /var/data
      sizeGB: 1
