# Render Blueprint — deploys InstaSwap as a Node web service.
# Render reads this automatically in the Blueprint flow.
#
# NOTE: currently on the FREE tier to prove the deploy with no payment.
# Free tier = slow cold starts + EPHEMERAL disk (swaps reset on restart/redeploy).
# Before real launch, upgrade to persist data:
#   plan: starter
#   + add a disk:  { name: instaswap-data, mountPath: /var/data, sizeGB: 1 }
#   + set env INSTASWAP_DATA_DIR=/var/data
services:
  - type: web
    name: instaswap
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
