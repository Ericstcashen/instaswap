# Render Blueprint — deploys InstaSwap as a Node web service with a persistent disk.
# Render reads this automatically when you create a "Blueprint" from the repo.
services:
  - type: web
    name: instaswap
    runtime: node
    # Starter ($7/mo): required for a persistent disk AND to avoid free-tier cold
    # starts (a QR scan can't wait ~50s for the app to wake up). Downgrade to
    # `free` only for throwaway testing — swaps won't persist across restarts there.
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: INSTASWAP_DATA_DIR
        value: /var/data
    disk:
      name: instaswap-data
      mountPath: /var/data
      sizeGB: 1
